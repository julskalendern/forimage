name: continius_integrations
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
permissions:
  contents: read
  packages: write

jobs:
  sobiraem-obraz:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: probe for dinamic tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/diplom
          tags: |
            type=semver,pattern={{version}}

      - name: docker build
        uses: docker/setup-buildx-action@v3

      - name: docker registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: create image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: cubeconf
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: helm
        run: |
          # добавила для логирования
          helm repo add grafana https://github.io
          helm repo update
          helm upgrade --install promtail grafana/promtail \
            --namespace monitoring \
            --create-namespace \
            -f promtail-values.yaml

          # 2. уже было в спринт 2
          helm upgrade --install app ./diplom \
            --set image.tag=${{ steps.meta.outputs.version }}
